<!DOCTYPE html>
<html>
<head>
    <title>Clear Session</title>
</head>
<body>
    <h1>Clear Session</h1>
    <button onclick="clearSession()">Clear All Auth Sessions</button>
    <p id="result"></p>
    
    <script>
        function clearSession() {
            // Clear all possible storage keys
            localStorage.clear();
            sessionStorage.clear();
            
            // Clear specific Supabase keys
            const keysToRemove = [
                'sb-twclzywfwwuhxspwvnti-auth-token',
                'parkspace-auth',
                'supabase.auth.token',
                'sb-auth-token'
            ];
            
            keysToRemove.forEach(key => {
                localStorage.removeItem(key);
                sessionStorage.removeItem(key);
            });
            
            document.getElementById('result').innerHTML = '✅ Session cleared! You can close this tab.';
            console.log('Session cleared');
        }
    </script>
</body>
</html>
